<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business First - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 { font-size: 2rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            background: #f9f9f9;
            overflow-x: auto;
        }
        .tab-button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            min-width: 150px;
        }
        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }
        .tab-button:hover { background: white; color: #667eea; }

        .content {
            padding: 30px 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section { margin-bottom: 25px; }
        .section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: #0c5a80;
        }
        .razorpay-note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            color: #856404;
        }
        .footer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary:hover { background: #e0e0e0; }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.5rem; }
            .tab-button { padding: 12px 10px; font-size: 0.9rem; min-width: auto; }
            .footer-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Business First Admin Panel</h1>
            <p>Manage Razorpay & social media settings</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('razorpay')">Razorpay Setup</button>
            <button class="tab-button" onclick="switchTab('social')">Social Media</button>
        </div>

        <div class="content">
            <div id="razorpay" class="tab-content active">
                <div class="razorpay-note">
                    ⚠️ <strong>Important:</strong> Get your API keys from
                    <a href="https://razorpay.com/dashboard" target="_blank" style="color:#856404;text-decoration:underline;">
                        Razorpay Dashboard
                    </a>
                </div>
                <div class="section">
                    <h3>Razorpay Configuration</h3>
                    <div class="info-box">
                        Steps: Dashboard → Settings → API Keys → Copy Key ID → Paste below.
                    </div>
                    <div class="form-group">
                        <label>Razorpay Key ID</label>
                        <input type="text" id="razorpayKeyId" placeholder="rzp_live_XXXXXXXXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Business Email</label>
                        <input type="email" id="razorpayEmail" placeholder="health@nosh7.com">
                    </div>
                    <div class="form-group">
                        <label>Business Contact Number</label>
                        <input type="tel" id="razorpayContact" placeholder="+918905196948">
                    </div>
                </div>
            </div>

            <div id="social" class="tab-content">
                <div class="info-box">Update social media profile links</div>
                <div class="section">
                    <h3>Social Media Links</h3>
                    <div class="form-group">
                        <label>📷 Instagram:</label>
                        <input type="url" id="socialInstagram" placeholder="https://instagram.com/...">
                    </div>
                    <div class="form-group">
                        <label>💼 LinkedIn:</label>
                        <input type="url" id="socialLinkedin" placeholder="https://linkedin.com/company/...">
                    </div>
                    <div class="form-group">
                        <label>👥 Facebook:</label>
                        <input type="url" id="socialFacebook" placeholder="https://facebook.com/...">
                    </div>
                    <div class="form-group">
                        <label>𝕏 Twitter:</label>
                        <input type="url" id="socialTwitter" placeholder="https://twitter.com/...">
                    </div>
                    <div class="form-group">
                        <label>📺 YouTube:</label>
                        <input type="url" id="socialYoutube" placeholder="https://youtube.com/...">
                    </div>
                    <div class="form-group">
                        <label>✉️ Email:</label>
                        <input type="email" id="socialEmail" placeholder="health@nosh7.com">
                    </div>
                </div>
            </div>

            <div class="footer-actions">
                <button class="btn-primary" onclick="exportSettings()">📥 Export Settings</button>
                <button class="btn-secondary" onclick="resetSettings()">🔄 Reset All</button>
            </div>
        </div>
    </div>

    <script>
        const defaultSettings = {
            razorpay: {
                keyId: "rzp_live_SSzAwKJApRwiFY",
                email: "health@nosh7.com",
                contact: "+918905196948"
            },
            social: {
                instagram: "https://instagram.com",
                linkedin: "https://linkedin.com",
                facebook: "https://facebook.com",
                twitter: "https://twitter.com",
                youtube: "https://youtube.com",
                email: "health@nosh7.com"
            }
        };

        let settings = JSON.parse(localStorage.getItem('businessFirstSettings')) || defaultSettings;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            if (tabName === 'razorpay') loadRazorpayForm();
            if (tabName === 'social') loadSocialForm();
        }

        function loadRazorpayForm() {
            document.getElementById('razorpayKeyId').value = settings.razorpay.keyId;
            document.getElementById('razorpayEmail').value = settings.razorpay.email;
            document.getElementById('razorpayContact').value = settings.razorpay.contact;
        }

        function loadSocialForm() {
            document.getElementById('socialInstagram').value = settings.social.instagram;
            document.getElementById('socialLinkedin').value = settings.social.linkedin;
            document.getElementById('socialFacebook').value = settings.social.facebook;
            document.getElementById('socialTwitter').value = settings.social.twitter;
            document.getElementById('socialYoutube').value = settings.social.youtube;
            document.getElementById('socialEmail').value = settings.social.email;
        }

        function exportSettings() {
            settings.razorpay.keyId = document.getElementById('razorpayKeyId').value;
            settings.razorpay.email = document.getElementById('razorpayEmail').value;
            settings.razorpay.contact = document.getElementById('razorpayContact').value;
            settings.social.instagram = document.getElementById('socialInstagram').value;
            settings.social.linkedin = document.getElementById('socialLinkedin').value;
            settings.social.facebook = document.getElementById('socialFacebook').value;
            settings.social.twitter = document.getElementById('socialTwitter').value;
            settings.social.youtube = document.getElementById('socialYoutube').value;
            settings.social.email = document.getElementById('socialEmail').value;

            localStorage.setItem('businessFirstSettings', JSON.stringify(settings));

            const dataStr = JSON.stringify(settings, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'business-first-settings.json';
            a.click();
            alert('Settings exported and saved to your computer.');
        }

        function resetSettings() {
            if (confirm('Reset all settings to defaults?')) {
                settings = JSON.parse(JSON.stringify(defaultSettings));
                localStorage.setItem('businessFirstSettings', JSON.stringify(settings));
                loadRazorpayForm();
                loadSocialForm();
                alert('Settings reset to defaults.');
            }
        }

        loadRazorpayForm();
        loadSocialForm();
    </script>
</body>
</html>
